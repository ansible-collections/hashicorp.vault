---
# @hand-crafted
- name: Converge - vault_pki_role_info
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/examples/vault_pki_role_info/vars.yml"
  tasks:
    - name: Create prerequisite PKI role
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/{{ mount_path }}/roles/{{ name }}"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_token }}"
        body_format: json
        body:
          allowed_domains: "{{ config.allowed_domains }}"
          allow_subdomains: "{{ config.allow_subdomains }}"
          max_ttl: "{{ config.max_ttl }}"
        status_code: [200, 204]

    - name: Include example tasks
      ansible.builtin.include_tasks:
        file: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/examples/vault_pki_role_info/info.yml"
