---
# vars_files: [vars.yml]
#
# auth_path: userpass
# config:
#   type: userpass
#   description: "Managed by Ansible"

- name: Manage Vault auth methods (present)
  hashicorp.vault.vault_auth_method:
    url: "{{ vault_addr }}"
    token: "{{ vault_token }}"
    state: present
    path: "{{ auth_path }}"
    type: "{{ config.type }}"
    description: "{{ config.description }}"
  register: result

- name: Verify return matches contract
  ansible.builtin.assert:
    that:
      - result is changed
      - (config | hashicorp.vault.vault_config_match(result.data)).match
    fail_msg: >-
      Contract violation:
      {{ (config | hashicorp.vault.vault_config_match(result.data)).mismatches | to_json }}
