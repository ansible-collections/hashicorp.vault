---
# vars_files: [vars.yml]
#
# params:
#   common_name: sign-test.example.com
#   ttl: "1h"
#
# expected_response_keys:
#   - certificate
#   - serial_number
#   - issuing_ca

- name: Generate a CSR for signing
  ansible.builtin.command:
    cmd: >-
      openssl req -new -newkey rsa:2048 -nodes
      -keyout /dev/null -subj "/CN={{ params.common_name }}"
  register: csr_result
  changed_when: false

- name: Sign a CSR using a PKI role
  hashicorp.vault.vault_pki_sign:
    url: "{{ vault_addr }}"
    token: "{{ vault_token }}"
    mount_path: "{{ mount_path }}"
    role: "{{ role }}"
    csr: "{{ csr_result.stdout }}"
    common_name: "{{ params.common_name }}"
    ttl: "{{ params.ttl }}"
  register: result

- name: Verify expected keys in response
  ansible.builtin.assert:
    that:
      - result is changed
      - result.data is defined
      - item in result.data
    fail_msg: "Missing key {{ item }} in result.data"
  loop: "{{ expected_response_keys }}"
  loop_control:
    label: "{{ item }}"
