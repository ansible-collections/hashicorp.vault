---
- name: Manage Vault PKI roles (absent)
  hashicorp.vault.vault_pki_role:
    url: "{{ vault_addr }}"
    token: "{{ vault_token }}"
    state: absent
    mount_path: "{{ mount_path }}"
    name: "{{ name }}"
  register: result

- name: Verify result
  ansible.builtin.assert:
    that:
      - result is not failed
