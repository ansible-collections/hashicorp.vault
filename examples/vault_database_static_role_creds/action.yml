---
# vars_files: [vars.yml]
#
# name: test-static-role
#
# expected_response_keys:
#   - username
#   - password

- name: Read current credentials for a database static role
  hashicorp.vault.vault_database_static_role_creds:
    url: "{{ vault_addr }}"
    token: "{{ vault_token }}"
    mount_path: "{{ mount_path }}"
    name: "{{ name }}"
  register: result

- name: Verify expected keys in response
  ansible.builtin.assert:
    that:
      - result is not changed
      - result.data is defined
      - item in result.data
    fail_msg: "Missing key {{ item }} in result.data"
  loop: "{{ expected_response_keys }}"
  loop_control:
    label: "{{ item }}"
