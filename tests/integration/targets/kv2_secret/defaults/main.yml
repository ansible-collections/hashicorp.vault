---
# Vault connection configuration
vault_url: "{{ vault_url_from_int_config }}"
vault_namespace: "{{ vault_namespace_from_int_config }}"
vault_approle_role_id: "{{ vault_approle_role_id_from_int_config }}"
vault_approle_secret_id: "{{ vault_approle_secret_id_from_int_config }}"

# Test configuration
secret_mount_path: "kv-integration-tests"
integration_tests_approle: "approle-integration-tests"
test_secret_path: "integration-test-secret"

# Test data sets
initial_data:
  username: "testuser"
  password: "initial_pass"
  env: "test"

updated_data:
  username: "testuser"
  password: "updated_pass"
  env: "test"
  updated: true
