---
# Vault connection configuration
vault_url: "{{ vault_url }}"
vault_namespace: "{{ vault_namespace }}"
vault_approle_role_id: "{{ vault_approle_role_id }}"
vault_approle_secret_id: "{{ vault_approle_secret_id }}"
test_reading_gh_action_secrets: "{{ test_reading_gh_action_secrets }}"

# Test configuration
secret_mount_path: "kv-integration-tests"
integration_tests_approle: "approle-integration-tests"
test_secret_path: "integration-test-test-secret"

# Test data sets
initial_data:
  username: "testuser"
  password: "initial_pass"
  env: "test"

updated_data:
  username: "testuser"
  password: "updated_pass"
  env: "test"
  updated: true
