[tox]
envlist = linters
skipsdist = true

[testenv:linters]
deps =
    black
    flake8
    isort
skip_install = true
commands =
    black --check {posargs:plugins/ tests/}
    flake8 {posargs:plugins/ tests/}
    isort --check {posargs:plugins/ tests/}

[testenv:black]
deps = black
skip_install = true
commands = black {posargs:plugins/ tests/}

[testenv:flake8]
deps = flake8
skip_install = true
commands = flake8 {posargs:plugins/ tests/}

[testenv:isort]
deps = isort
skip_install = true
commands = isort {posargs:plugins/ tests/}
