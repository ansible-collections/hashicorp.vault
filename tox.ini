[tox]
envlist = linters
skipsdist = true

[testenv:linters]
deps = -r requirements-linters.txt
skip_install = true
commands =
    black --check {posargs:plugins/ tests/}
    flake8 {posargs:plugins/ tests/}
    isort --check {posargs:plugins/ tests/}

[testenv:black]
deps = black==26.3.1
skip_install = true
commands = black {posargs:plugins/ tests/}

[testenv:flake8]
deps = flake8==7.0.0
skip_install = true
commands = flake8 {posargs:plugins/ tests/}

[testenv:isort]
deps = isort==6.1.0
skip_install = true
commands = isort {posargs:plugins/ tests/}

[testenv:molecule]
deps =
    ansible-dev-environment
    molecule
skip_install = true
allowlist_externals =
    ade
    molecule
    podman
commands_pre =
    ade install -e . --venv {envdir}
    ade install containers.podman --venv {envdir}
commands =
    molecule test --all {posargs}
passenv =
    HOME
    PODMAN_*
    CONTAINER_*
setenv =
    ANSIBLE_COLLECTIONS_PATH = /dev/null
