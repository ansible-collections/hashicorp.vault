---
name: Integration

on: # yamllint disable-line rule:truthy
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  run-integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ansible-version:
          - stable-2.19
          - stable-2.18
          - devel
        python-version:
          - "3.12"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ansible-core (${{ matrix.ansible-version }})
        run: python3 -m pip install https://github.com/ansible/ansible/archive/${{ matrix.ansible-version }}.tar.gz --disable-pip-version-check

      - name: Install collection test dependencies
        run: python3 -m pip install -r test-requirements.txt

      - name: Build and install the collection
        run: ansible-galaxy collection install . --force

      - name: List all integration test targets
        run: |
          cd ~/.ansible/collections/ansible_collections/hashicorp/vault && \
          ansible-test integration --list-targets || echo "No integration targets found"

      - name: Check for integration test targets
        id: check-targets
        run: |
          cd ~/.ansible/collections/ansible_collections/hashicorp/vault
          if ansible-test integration --list-targets > /dev/null 2>&1; then
            echo "has-targets=true" >> $GITHUB_OUTPUT
          else
            echo "has-targets=false" >> $GITHUB_OUTPUT
          fi

      - name: Render integration_config.yml from template
        shell: bash
        run: |
          set -euo pipefail

          COLL_DIR="$HOME/.ansible/collections/ansible_collections/hashicorp/vault"
          mkdir -p "$COLL_DIR/tests/integration"
          install -m 600 /dev/null "$COLL_DIR/tests/integration/integration_config.yml"

          export VAULT_ADDR="${{ secrets.VAULT_ADDR }}"
          export VAULT_NAMESPACE="${{ secrets.VAULT_NAMESPACE }}"
          export VAULT_APPROLE_ROLE_ID="${{ secrets.VAULT_APPROLE_ROLE_ID }}"
          export VAULT_APPROLE_SECRET_ID="${{ secrets.VAULT_APPROLE_SECRET_ID }}"
          export TEST_READING_GH_ACTION_SECRETS="${{ secrets.TEST_READING_GH_ACTION_SECRETS }}"

          # Ensure renderer is usable
          sed -i 's/\r$//' tests/utils/render.sh || true
          chmod +x tests/utils/render.sh

          # Render from repo template into the installed collection tree
          bash tests/utils/render.sh tests/integration/integration_config.yml.template \
            > "$COLL_DIR/tests/integration/integration_config.yml"

      - name: Run integration tests
        run: |
          cd ~/.ansible/collections/ansible_collections/hashicorp/vault && \
          ansible-test integration --python ${{ matrix.python-version }} --continue-on-error

      - name: Clean up integration config
        if: always()
        run: rm -f "$HOME/.ansible/collections/ansible_collections/hashicorp/vault/tests/integration/integration_config.yml"
