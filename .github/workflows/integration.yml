---
name: Integration

on: # yamllint disable-line rule:truthy
  pull_request_target:
    types:
      - opened
      - reopened
      - labeled
      - unlabeled
      - synchronize
    branches:
      - main
      - stable-*

jobs:
  safe-to-test:
    if: ${{ github.event.label.name == 'safe to test' }} || ${{ github.event.action != 'labeled' }}
    uses: ansible-network/github_actions/.github/workflows/safe-to-test.yml@main

  run-integration-tests:
    needs:
      - safe-to-test
    runs-on: ubuntu-latest
    env:
      source: "./"
    strategy:
      fail-fast: false
      matrix:
        ansible-version:
          - stable-2.19
          - stable-2.18
          - devel
        python-version:
          - "3.12"
    name: "integration-tests-${{ matrix.ansible-version }}-${{ matrix.python-version }}"
    steps:
      - uses: actions/checkout@v4
        with:
          path: ${{ env.source }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ansible-core (${{ matrix.ansible-version }})
        run: python3 -m pip install https://github.com/ansible/ansible/archive/${{ matrix.ansible-version }}.tar.gz --disable-pip-version-check

      # Install the source collection
      - name: Build and install collection
        id: install-collection
        uses: ansible-network/github_actions/.github/actions/build_install_collection@main
        with:
          install_python_dependencies: true
          source_path: ${{ env.source }}

      - name: Set up git
        run: |
          git config --global user.email gha@localhost
          git config --global user.name "Github Actions"
        shell: bash

      - name: Run integration tests
        run: |
          # Set environment variables for the test
          export VAULT_ADDR="${{ secrets.VAULT_ADDR }}"
          export VAULT_NAMESPACE="${{ vars.VAULT_NAMESPACE }}"
          export VAULT_TOKEN="${{ secrets.VAULT_TOKEN }}"
          export TEST_VAULT_SECRET_PATH="${{ vars.TEST_VAULT_SECRET_PATH }}"

          # Run the integration test using ansible-test with venv
          # This allows environment variables to be passed through to the test
          ansible-test integration lookup_kv2_secret_get --venv --python "${{ matrix.python-version }}"
        shell: bash
